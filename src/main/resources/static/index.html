
<!DOCTYPE html>
<html>
<head>
    <title>Security Demo</title>
</head>
<body>

<h1>Security Demo</h1>

<h2>JWT Login</h2>
<input id="user" placeholder="username">
<input id="pass" placeholder="password" type="password">
<button onclick="login()">Login (JWT)</button>

<h2>OAuth2 Login</h2>
<a href="/oauth2/authorization/github">Login with GitHub</a>

<h2>Actions</h2>
<button onclick="getPublic()">Get Public</button>
<button onclick="getPrivate()">Get Private</button>

<h2>Status</h2>
<pre id="output">No action yet</pre>

<script>
let token = "";

function show(message) {
    document.getElementById('output').textContent = message;
}

async function login() {
    const res = await fetch('/auth/login', {
        method: 'POST',
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: document.getElementById('user').value,
            password: document.getElementById('pass').value
        })
    });

    if (!res.ok) {
        const errorText = await res.text();
        show('Login failed: ' + res.status + ' ' + errorText);
        console.error('Login failed:', res.status, errorText);
        return;
    }

    const data = await res.json();
    token = data.token;
    show('Login successful. Token received.');
    console.log("TOKEN:", token);
}

async function getPublic() {
    const res = await fetch('/public');
    const text = await res.text();
    show('Public response: ' + res.status + '\n' + text);
    console.log(text);
}

async function getPrivate() {
    const res = await fetch('/private', {
        headers: {
            "Authorization": "Bearer " + token
        }
    });
    const text = await res.text();
    show('Private response: ' + res.status + '\n' + text);
    console.log(text);
}
</script>

</body>
</html>
